<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <title>Raj Anand Soni's Projects</title>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.2);
        --glass-hover: rgba(255, 255, 255, 0.18);
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        /* Dynamic Liquid Abstract Mesh Background */
        background: linear-gradient(135deg, #1f1135, #511c74, #0091ea, #d500f9);
        background-size: 400% 400%;
        animation: liquidMesh 18s ease infinite;
        color: white;
        overflow-x: hidden;
      }

      @keyframes liquidMesh {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Interactive 3D Liquid Canvas */
      #fluid-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        mix-blend-mode: screen;
        opacity: 0.55;
      }

      /* Container Setup */
      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        box-sizing: border-box;
      }

      /* iOS Glassmorphism Profile Shell */
      .profile-card {
        background: var(--glass-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 24px 20px;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(20px);
        opacity: 0;
        animation: iOSSpawn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .image-container {
        margin-bottom: 12px;
      }

      /* Google Drive Hosted Direct File URL */
      .image-container img {
        border-radius: 50%;
        border: 2.5px solid rgba(255, 255, 255, 0.85);
        width: 90px;
        height: 90px;
        object-fit: cover;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        transition: transform 0.4s cubic-bezier(0.15, 1, 0.3, 1);
      }

      .image-container img:hover {
        transform: scale(1.06);
      }

      .header-text {
        text-align: center;
        margin-bottom: 20px;
      }

      .header-text p {
        margin: 2px 0;
        font-size: 0.95em;
        color: rgba(255, 255, 255, 0.85);
      }

      .header-text .title {
        font-size: 1.35em;
        font-weight: 600;
        color: #ffffff;
        display: block;
        margin: 2px 0 6px 0;
        letter-spacing: -0.3px;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 9px;
      }

      /* Streamlined iOS-style Compact Link Rows */
      .link {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.95);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-sizing: border-box;
      }

      .link i {
        margin-right: 12px;
        font-size: 15px;
        width: 20px;
        text-align: center;
        color: rgba(255, 255, 255, 0.8);
      }

      .link:hover {
        background: var(--glass-hover);
        border-color: rgba(255, 255, 255, 0.35);
        transform: translateY(-1.5px);
        color: #ffffff;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      }

      @keyframes iOSSpawn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .profile-card {
          max-width: 310px;
          padding: 20px 16px;
        }
        .link {
          font-size: 13.5px;
          padding: 10px 14px;
        }
      }
    </style>
  </head>
  <body>

    <!-- Liquid Glass Distortion Layer -->
    <canvas id="fluid-canvas"></canvas>

    <div class="container">
      <div class="profile-card">
        <div class="image-container">
          <!-- Fixed Direct-Download ID Endpoint Link -->
          <img
            src="https://docs.google.com/uc?export=download&id=122JfqqQkYYByjKCtv6Qi5e5cJ9TsMZqy"
            alt="Raj Anand Soni"
          />
        </div>

        <div class="header-text">
          <p>Welcome to</p>
          <span class="title">Raj Anand Soni's Hub</span>
          <p style="font-size: 0.85em; color: rgba(255,255,255,0.6);">Interactive Project Directory</p>
        </div>

        <div class="links-container">
          <a href="https://rajsoni06.github.io/Universe_Cosmos/Universe/index.html" class="link" target="_blank">
            <i class="fas fa-globe"></i> Universe Website
          </a>
          <a href="https://rajsoni06.github.io/Space_X_Website/Space_X/index.html" class="link" target="_blank">
            <i class="fas fa-rocket"></i> SpaceX Website
          </a>
          <a href="https://nihongo-journey.netlify.app/" class="link" target="_blank">
            <i class="fas fa-language"></i> Nihongo Journey Site
          </a>
          <a href="https://rajsoni06.github.io/Responsive_UI_Design/" class="link" target="_blank">
            <i class="fas fa-desktop"></i> Responsive UI Design
          </a>
          <a href="https://chat-app-jsm-video.netlify.app" class="link" target="_blank">
            <i class="fas fa-video"></i> React Video Chat App
          </a>
          <a href="https://ping-connect.vercel.app/login" class="link" target="_blank">
            <i class="fas fa-comments"></i> Social Application
          </a>
          <a href="https://rajsoni06.github.io/Face_Recognition_Attendance_System/Face-Recognition-Attendance-System.html" class="link" target="_blank">
            <i class="fas fa-user"></i> Face Recognition
          </a>
        </div>
      </div>
    </div>

    <!-- Background script generating shifting liquid colors beneath the components -->
    <script>
      const canvas = document.getElementById('fluid-canvas');
      const ctx = canvas.getContext('2d');

      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;
      let mouse = { x: width / 2, y: height / 2 };
      
      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      class LightOrb {
        constructor(color, sizeMult) {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 1.2;
          this.vy = (Math.random() - 0.5) * 1.2;
          this.baseRadius = (Math.random() * 120 + 160) * sizeMult;
          this.radius = this.baseRadius;
          this.color = color;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;

          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 350) {
            this.radius = this.baseRadius + (350 - dist) * 0.2;
          } else {
            this.radius = this.radius + (this.baseRadius - this.radius) * 0.05;
          }
        }

        draw() {
          let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
          gradient.addColorStop(0, this.color);
          gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();
        }
      }

      const orbs = [
        new LightOrb('rgba(0, 229, 255, 0.35)', 1),
        new LightOrb('rgba(213, 0, 249, 0.35)', 1.2),
        new LightOrb('rgba(81, 28, 116, 0.4)', 1.4)
      ];

      function loop() {
        ctx.clearRect(0, 0, width, height);
        orbs.forEach(orb => {
          orb.update();
          orb.draw();
        });
        requestAnimationFrame(loop);
      }

      loop();
    </script>
  </body>
</html>
