<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>Raj Anand Soni's Projects</title>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.45);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-hover: rgba(255, 255, 255, 0.75);
        --text-color: #2c3e50;
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        /* Bright Fluid Base shifting between Cyan, Blue, and Mint Green */
        background: linear-gradient(135deg, #e0f7fa, #e1f5fe, #e8f5e9, #b2ebf2);
        background-size: 400% 400%;
        animation: brightLiquid 14s ease infinite;
        color: var(--text-color);
        overflow-x: hidden;
      }

      @keyframes brightLiquid {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Interactive Fluid Visualizer Layer */
      #fluid-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        opacity: 0.85;
      }

      /* Main Layout Viewport */
      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 30px 20px;
        box-sizing: border-box;
      }

      /* Light iOS Glassmorphism Card */
      .profile-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 24px 20px;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 15px 35px rgba(31, 45, 61, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(20px);
        opacity: 0;
        animation: iOSSpawn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .image-container {
        margin-bottom: 12px;
      }

      .image-container img {
        border-radius: 50%;
        border: 3px solid #ffffff;
        width: 95px;
        height: 95px;
        object-fit: cover;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        transition: transform 0.4s cubic-bezier(0.15, 1, 0.3, 1);
        background-color: #e0f2f1;
      }

      .image-container img:hover {
        transform: scale(1.05);
      }

      .header-text {
        text-align: center;
        margin-bottom: 18px;
      }

      .header-text p {
        margin: 2px 0;
        font-size: 0.95em;
        color: #5c6b73;
        font-weight: 500;
      }

      .header-text .title {
        font-size: 1.35em;
        font-weight: 700;
        color: #1a2a3a;
        display: block;
        margin: 2px 0 4px 0;
        letter-spacing: -0.3px;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 9px;
      }

      /* Compact High-Contrast Buttons */
      .link {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 600;
        color: #2c3e50;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-sizing: border-box;
      }

      .link i {
        margin-right: 12px;
        font-size: 15px;
        width: 20px;
        text-align: center;
        color: #0288d1;
      }

      .link:hover {
        background: var(--glass-hover);
        border-color: #00b0ff;
        transform: translateY(-1.5px);
        color: #0288d1;
        box-shadow: 0 6px 14px rgba(0, 176, 255, 0.15);
      }

      @keyframes iOSSpawn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .profile-card {
          max-width: 310px;
          padding: 20px 16px;
        }
        .link {
          font-size: 13.5px;
          padding: 10px 14px;
        }
      }
    </style>
  </head>
  <body>

    <!-- Fluid Background Canvas -->
    <canvas id="fluid-canvas"></canvas>

    <div class="container">
      <div class="profile-card">
        <div class="image-container">
          <!-- Your image link with safe structural fallback layout -->

            src="https://docs.google.com/uc?export=download&id=122JfqqQkYYByjKCtv6Qi5e5cJ9TsMZqy"

          />
        </div>

        <div class="header-text">
          <p>Welcome to</p>
          <span class="title">Raj Anand Soni's Hub</span>
          <p style="font-size: 0.85em; color: #7f8c8d;">Interactive Project Directory</p>
        </div>

        <div class="links-container">
          <a href="https://nihonhub.netlify.app/" class="link" target="_blank">
            <i class="fas fa-torii-gate" style="color: #ff5722;"></i> NihonHub

            <i class="fas fa-globe" style="color: #0288d1;"></i> Universe Website

            <i class="fas fa-user-shield" style="color: #1565c0;"></i> Face Recognition

        </div>
      </div>
    </div>

    <!-- Script generating high-brightness cyan/blue/mint interactive ambient elements -->
    <script>
      const canvas = document.getElementById('fluid-canvas');
      const ctx = canvas.getContext('2d');

      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;
      let mouse = { x: width / 2, y: height / 2 };
      
      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      class LightOrb {
        constructor(color, sizeMult) {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.9;
          this.vy = (Math.random() - 0.5) * 0.9;
          this.baseRadius = (Math.random() * 140 + 160) * sizeMult;
          this.radius = this.baseRadius;
          this.color = color;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;

          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 300) {
            this.radius = this.baseRadius + (300 - dist) * 0.2;
          } else {
            this.radius = this.radius + (this.baseRadius - this.radius) * 0.05;
          }
        }

        draw() {
          let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
          gradient.addColorStop(0, this.color);
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();
        }
      }

      // Strictly bright Cyan, Deep Sky Blue, and Mint Green orbs
      const orbs = [
        new LightOrb('rgba(0, 229, 255, 0.45)', 1),  // Vibrant Cyan
        new LightOrb('rgba(41, 121, 255, 0.35)', 1.3), // Rich Blue
        new LightOrb('rgba(105, 240, 174, 0.4)', 1.1)  // Mint Green
      ];

      function loop() {
        ctx.clearRect(0, 0, width, height);
        orbs.forEach(orb => {
          orb.update();
          orb.draw();
        });
        requestAnimationFrame(loop);
      }

      loop();
    </script>
  </body>
</html>
